<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCAA DI Women's Hockey Directory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>NCAA Division 1 Women's Hockey Directory</h1>
        <p>Find and filter comprehensive program details, rosters, and coaching staff.</p>
        
        <!-- Search and Filter Controls -->
        <div class="controls">
            <input type="text" id="searchBar" placeholder="Search by school or coach...">
            <select id="conferenceFilter">
                <option value="all">All Conferences</option>
                <option value="WCHA">WCHA</option>
                <option value="ECAC">ECAC</option>
                <option value="Hockey East">Hockey East</option>
                <option value="AHA">AHA</option>
                <option value="NEWHA">NEWHA</option>
            </select>
        </div>
    </header>

    <!-- Main Container for Team Cards -->
    <main id="teamsContainer">
        <!-- JavaScript will dynamically insert team cards here -->
    </main>

    <script src="script.js"></script>
</body>
</html>
